<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Produção</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .container {
      width: 100%;
      max-width: 820px;
      background: #1e293b;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 28px;
    }
    .logout {
      background: #334155;
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      display: inline-block;
    }
    .inputs {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 10px;
      margin-top: 22px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 0;
      border-radius: 10px;
      background: #334155;
      color: white;
      outline: none;
    }
    input::placeholder { color: #94a3b8; }
    button {
      width: 100%;
      padding: 12px 14px;
      margin-top: 12px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    button:hover { transform: scale(1.01); }
    .kpi {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      font-size: 18px;
      font-weight: bold;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 16px 0 0;
    }
    li {
      background: #334155;
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .item-text {
      line-height: 1.4;
    }
    .del {
      background: #ef4444;
      border: 0;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      width: auto;
      margin-top: 0;
      flex-shrink: 0;
    }
    .grafico-box {
      margin-top: 22px;
      background: #0f172a;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #334155;
    }
    canvas { width: 100% !important; max-height: 360px; }
    @media (max-width: 640px) {
      .inputs { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <h1>📊 Dashboard de Produção</h1>
      <a class="logout" href="/logout">Sair</a>
    </div>

    <div class="inputs">
      <input id="maquina" placeholder="Máquina">
      <input id="quantidade" type="number" placeholder="Quantidade">
    </div>

    <button onclick="enviar()">Salvar Produção</button>

    <div id="total" class="kpi">Total produzido: 0</div>

    <h2>📋 Registros</h2>
    <ul id="lista"></ul>

    <div class="grafico-box">
      <canvas id="grafico"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    let grafico = null;

    function deletarGrafico() {
      if (grafico) {
        grafico.destroy();
        grafico = null;
      }
    }

    async function enviar() {
      const maquina = document.getElementById("maquina").value.trim();
      const quantidade = document.getElementById("quantidade").value.trim();

      if (!maquina || !quantidade) {
        alert("Preencha máquina e quantidade.");
        return;
      }

      await fetch("/api/producao", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          maquina,
          quantidade,
          data: new Date().toISOString().slice(0, 10)
        })
      });

      document.getElementById("maquina").value = "";
      document.getElementById("quantidade").value = "";
      carregar();
    }

    async function deletarRegistro(id) {
      if (!confirm("Tem certeza que deseja deletar?")) return;

      await fetch(`/api/producao/${id}`, {
        method: "DELETE"
      });

      carregar();
    }

    async function carregar() {
      const resposta = await fetch("/api/producao");
      const dados = await resposta.json();

      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      dados.forEach(d => {
        const li = document.createElement("li");

        const texto = document.createElement("div");
        texto.className = "item-text";
        texto.innerHTML = `🏭 <strong>${d[1]}</strong><br>🔢 ${d[2]} peças<br>📅 ${d[3]}`;

        const botao = document.createElement("button");
        botao.className = "del";
        botao.textContent = "🗑️";
        botao.onclick = () => deletarRegistro(d[0]);

        li.appendChild(texto);
        li.appendChild(botao);
        lista.appendChild(li);
      });

      const total = dados.reduce((acc, d) => acc + Number(d[2]), 0);
      document.getElementById("total").textContent = `Total produzido: ${total}`;

      desenharGrafico(dados);
    }

    function desenharGrafico(dados) {
      const ctx = document.getElementById("grafico");

      deletarGrafico();

      grafico = new Chart(ctx, {
        type: "bar",
        data: {
          labels: dados.map(d => d[1]),
          datasets: [{
            label: "Produção",
            data: dados.map(d => Number(d[2])),
            backgroundColor: "#22c55e"
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              labels: { color: "#fff" }
            }
          },
          scales: {
            x: {
              ticks: { color: "#fff" },
              grid: { color: "rgba(255,255,255,0.08)" }
            },
            y: {
              ticks: { color: "#fff" },
              grid: { color: "rgba(255,255,255,0.08)" }
            }
          }
        }
      });
    }

    carregar();
  </script>
</body>
</html>
